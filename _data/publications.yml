            @InProceedings{10.1007/978-3-031-30035-6_7,
              author="Grelier, Cyril
              and Goudet, Olivier
              and Hao, Jin-Kao",
              editor="P{\'e}rez C{\'a}ceres, Leslie
              and St{\"u}tzle, Thomas",
              title="Monte Carlo Tree Search with Adaptive Simulation: A Case Study on Weighted Vertex Coloring",
              booktitle="Evolutionary Computation in Combinatorial Optimization",
              year="2023",
              publisher="Springer Nature Switzerland",
              address="Cham",
              pages="98--113",
              abstract="This work presents a hyper-heuristic approach to online learning, which combines Monte Carlo Tree Search with multiple local search operators selected on the fly during the search. The impacts of different operator policies, including proportional bias, one-armed bandit, and neural network, are investigated. Experiments on well-known benchmarks of the Weighted Vertex Coloring Problem are conducted to highlight the advantages and limitations of each dynamic selection strategy.",
              isbn="978-3-031-30035-6"
            }

