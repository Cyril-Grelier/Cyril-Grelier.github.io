          id: MCTS_EVOCOP_extended
          doi: https://doi.org/10.1007/s42979-025-03811-x
          openaccess: https://doi.org/10.1007/s42979-025-03811-x
          scimago: https://www.scimagojr.com/journalsearch.php?q=21101083109&tip=sid&clean=0
          scimago_rank: Q2
          bibtex: |
            @article{Grelier2025,
              author={Grelier, Cyril
              and Goudet, Olivier
              and Hao, Jin-Kao},
              title={Combining Monte Carlo Tree Search and Heuristic Search for Weighted Vertex Coloring},
              journal={SN Computer Science},
              year={2025},
              month={Mar},
              day={13},
              volume={6},
              number={3},
              pages={283},
              abstract={This work investigates the Monte Carlo Tree Search (MCTS) method combined with dedicated heuristics for solving the Weighted Vertex Coloring Problem. In addition to the basic MCTS algorithm, we study several MCTS variants where the conventional random simulation is replaced by other simulation strategies including greedy and local search heuristics. We conduct experiments on well-known benchmark instances to assess these combined MCTS variants. We provide empirical evidence to shed light on the advantages and limits of each simulation strategy. This is an extension of the work [1] presented at EvoCOP2022.},
              issn={2661-8907},
              doi={10.1007/s42979-025-03811-x},
              url={https://doi.org/10.1007/s42979-025-03811-x}
