        - title: Combining Monte Carlo Tree Search and Heuristic Search for Weighted Vertex Coloring
          link: https://link.springer.com/article/10.1007/s42979-025-03811-x
          authors: Cyril Grelier, Olivier Goudet, Jin-Kao Hao
