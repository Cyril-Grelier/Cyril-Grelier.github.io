        - title: A Memetic Algorithm with Adaptive Operator Selection for Graph Coloring
          link: https://link.springer.com/chapter/10.1007/978-3-031-57712-3_5
          authors: Cyril Grelier, Olivier Goudet, Jin-Kao Hao
          conference: "Proceedings of the 24th European Conference on Evolutionary Computation in Combinatorial Optimization (EvoCOP 2024), 3-5 April 2024, Wales, UK, Lecture Notes in Computer Science 14632: 65–80, 2024  Springer."
