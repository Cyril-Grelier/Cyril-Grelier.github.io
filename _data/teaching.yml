hetd_coefficients:
  - type: CM
    coefficient: 1.5
    note: "2h CM = 3h HETD"
  - type: EI
    coefficient: 1.1667
    note: "1h EI = 7/6h HETD (12h EI = 14h HETD)"
  - type: TD
    coefficient: 1.0
    note: "1h TD = 1h HETD"
  - type: TP
    coefficient: 1.0
    note: "1h TP = 1h HETD"

